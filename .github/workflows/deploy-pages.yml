name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install customer-form deps
        working-directory: customer-form
        run: npm install

      - name: Build customer-form
        working-directory: customer-form
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:8000' }}
        run: npm run build

      - name: Install dashboard deps
        working-directory: dashboard
        run: npm install

      - name: Build dashboard
        working-directory: dashboard
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:8000' }}
        run: npm run build

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site/customer-form
          mkdir -p _site/dashboard
          cp -r customer-form/dist/* _site/customer-form/
          cp -r dashboard/dist/* _site/dashboard/
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Mark Miller Subaru Demo Apps</title>
              <style>
                body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.5; }
                a { display: block; margin: 12px 0; font-size: 1.1rem; }
              </style>
            </head>
            <body>
              <h1>Mark Miller Subaru Demo Apps</h1>
              <a href="./customer-form/">Customer Form</a>
              <a href="./dashboard/">Dashboard</a>
            </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
